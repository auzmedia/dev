<!DOCTYPE html>
<html lang="uz" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aloshiy Dev | Premium Web Development</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/10.16.4/framer-motion.js"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .dark { background-color: #0f172a; color: white; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-slate-900 transition-all duration-500">

    <nav class="fixed w-full z-50 p-6 flex justify-between items-center glass">
        <div class="text-2xl font-bold">ALOSHIY.DEV</div>
        <div class="hidden md:flex gap-8 items-center">
            <a href="#about" class="hover:text-blue-500">Biz haqimizda</a>
            <a href="#services" class="hover:text-blue-500">Xizmatlar</a>
            <a href="#portfolio" class="hover:text-blue-500">Portfolio</a>
            <select id="lang" class="bg-transparent"><option>UZ</option><option>RU</option><option>KG</option></select>
            <button id="themeToggle" class="p-2 bg-gray-200 dark:bg-gray-700 rounded-full">🌓</button>
        </div>
        <button id="menuBtn" class="md:hidden">☰</button>
    </nav>

    <section class="h-screen flex items-center justify-center text-center">
        <div>
            <h1 class="text-6xl font-bold mb-6">Kelajak Biznesingizni Yarating</h1>
            <p class="text-xl text-gray-500 mb-10">Premium Web Dasturlash va Avtomatlashtirish</p>
            <a href="#order" class="px-8 py-4 bg-blue-600 text-white rounded-full">Buyurtma berish</a>
        </div>
    </section>

    <section id="services" class="py-20 px-6 grid md:grid-cols-4 gap-6">
        <div class="glass p-8 rounded-2xl">
            <h3 class="text-2xl font-bold">Standard</h3>
            <ul class="my-6 space-y-2"><li>Landing Page</li><li>Mobil moslashuv</li></ul>
        </div>
        <div class="glass p-8 rounded-2xl bg-blue-600/10 border-blue-500">
            <h3 class="text-2xl font-bold">VIP</h3>
            <ul class="my-6 space-y-2"><li>Standard +</li><li>Telegram Bot</li></ul>
        </div>
        </section>

    <section id="order" class="py-20 max-w-2xl mx-auto px-6">
        <form id="orderForm" class="grid gap-6">
            <input type="text" id="ism" placeholder="Ism" required class="p-4 rounded-lg bg-white dark:bg-slate-800 border">
            <input type="text" id="familiya" placeholder="Familiya" required class="p-4 rounded-lg bg-white dark:bg-slate-800 border">
            <input type="tel" id="raqam" placeholder="Tel: +998..." required class="p-4 rounded-lg bg-white dark:bg-slate-800 border">
            <select id="xizmat" class="p-4 rounded-lg bg-white dark:bg-slate-800 border">
                <option>Standard</option><option>VIP</option><option>Premium</option><option>Gold</option>
            </select>
            <textarea id="izoh" placeholder="Izoh" class="p-4 rounded-lg bg-white dark:bg-slate-800 border"></textarea>
            <button type="submit" id="submitBtn" class="p-4 bg-blue-600 text-white rounded-lg">Yuborish</button>
        </form>
    </section>

    <script>
        // DARK MODE
        document.getElementById('themeToggle').onclick = () => document.documentElement.classList.toggle('dark');

        // GOOGLE APPS SCRIPT INTEGRATSIYASI
        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Yuborilmoqda...";

            const data = {
                ism: document.getElementById('ism').value,
                familiya: document.getElementById('familiya').value,
                raqam: document.getElementById('raqam').value,
                xizmat: document.getElementById('xizmat').value,
                izoh: document.getElementById('izoh').value
            };

            try {
                await fetch('https://script.google.com/macros/s/AKfycbz8wK8yviqkLKMLyWha9nISwh7389oa4ntHP3Jub6jGPJXskQBg8oBacAMimaNGCCG45g/exec', { // <--- SHU YERGA URLNI QO'YING
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                alert("Buyurtma qabul qilindi! Tez orada bog'lanamiz.");
            } catch (err) {
                alert("Xatolik yuz berdi.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Yuborish";
            }
        };
    </script>
</body>
</html>
