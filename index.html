<!DOCTYPE html>
<html lang="uz" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALOSHIY.DEV | Digital Excellence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/10.16.4/framer-motion.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #030712; color: #fff; transition: background 0.8s ease; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav class="fixed w-full z-50 px-8 py-6 flex justify-between items-center mix-blend-difference">
        <div class="text-3xl font-black">ALOSHIY<span class="text-blue-500">.</span></div>
        <div class="flex gap-8 text-xs font-bold uppercase tracking-widest">
            <a href="#work" class="hover:text-blue-500 transition">Work</a>
            <a href="#services" class="hover:text-blue-500 transition">Services</a>
            <button id="themeToggle">🌓</button>
        </div>
    </nav>

    <!-- HERO -->
    <header class="min-h-screen flex flex-col justify-center items-center text-center px-6">
        <h1 class="text-[clamp(3rem,12vw,9rem)] font-black leading-[0.9] mb-8">BUILDING <br/><span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-400">THE IMPOSSIBLE</span></h1>
        <p class="text-gray-400 text-lg max-w-lg">Premium web-dasturlash va raqamli reallikni arxitektura qilamiz.</p>
    </header>

    <!-- PORTFOLIO INTERACTIVE -->
    <section id="work" class="py-32 px-6 max-w-7xl mx-auto">
        <h2 class="text-xs uppercase tracking-[0.5em] text-gray-500 mb-20">Selected Works</h2>
        <div class="group">
            <div onmouseenter="document.body.style.backgroundColor='#1e3a8a'" onmouseleave="document.body.style.backgroundColor='#030712'" class="border-t border-white/10 py-12 flex justify-between items-center cursor-pointer hover:px-10 transition-all duration-500">
                <h3 class="text-6xl font-black">FastFood WebApp</h3>
                <span class="text-sm uppercase italic">Live Demo</span>
            </div>
            <div onmouseenter="document.body.style.backgroundColor='#4c1d95'" onmouseleave="document.body.style.backgroundColor='#030712'" class="border-t border-white/10 py-12 flex justify-between items-center cursor-pointer hover:px-10 transition-all duration-500">
                <h3 class="text-6xl font-black">Medical SaaS</h3>
                <span class="text-sm uppercase italic">Live Demo</span>
            </div>
            <div onmouseenter="document.body.style.backgroundColor='#064e3b'" onmouseleave="document.body.style.backgroundColor='#030712'" class="border-y border-white/10 py-12 flex justify-between items-center cursor-pointer hover:px-10 transition-all duration-500">
                <h3 class="text-6xl font-black">Tapchan AR</h3>
                <span class="text-sm uppercase italic">Live Demo</span>
            </div>
        </div>
    </section>

    <!-- ORDER FORM -->
    <section id="order" class="py-32 max-w-xl mx-auto px-6">
        <form id="orderForm" class="glass p-12 rounded-[2rem]">
            <h2 class="text-4xl font-black mb-10">Let's talk business.</h2>
            <div class="grid gap-6">
                <input type="text" id="ism" placeholder="Ismingiz" required class="bg-transparent border-b border-white/20 p-4 outline-none focus:border-blue-500">
                <input type="text" id="raqam" placeholder="Telefon" required class="bg-transparent border-b border-white/20 p-4 outline-none focus:border-blue-500">
                <textarea id="izoh" placeholder="Loyihangiz haqida..." class="bg-transparent border-b border-white/20 p-4 outline-none h-32"></textarea>
                <button type="submit" id="submitBtn" class="w-full py-6 bg-white text-black font-black uppercase tracking-widest hover:bg-blue-600 hover:text-white transition">Submit Request</button>
            </div>
        </form>
    </section>

    <!-- FOOTER -->
    <footer class="py-10 text-center border-t border-white/5 text-gray-500 text-xs">
        <p>&copy; 2026 ALOSHIY.DEV — Barcha huquqlar himoyalangan.</p>
    </footer>

    <script>
        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Processing...";
            const data = {
                ism: document.getElementById('ism').value,
                raqam: document.getElementById('raqam').value,
                izoh: document.getElementById('izoh').value,
                xizmat: "Premium",
                familiya: "User"
            };
            try {
                await fetch('SENING_APPS_SCRIPT_URLING_BU_YERGA', {
                    method: 'POST', mode: 'no-cors',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                alert("Buyurtma qabul qilindi!");
            } catch(e) { alert("Xatolik!"); }
            btn.innerText = "Submit Request";
        };
    </script>
</body>
</html>
