<!DOCTYPE html>
<html lang="uz" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALOSHIY.DEV | Digital Excellence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/10.16.4/framer-motion.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #030712; color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hero-gradient { background: radial-gradient(circle at 50% 50%, #1e3a8a 0%, #030712 70%); }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav class="fixed w-full z-50 px-8 py-6 flex justify-between items-center mix-blend-difference">
        <div class="text-3xl font-extrabold tracking-tighter">ALOSHIY<span class="text-blue-500">.</span></div>
        <div class="flex items-center gap-10 text-xs font-bold uppercase tracking-widest">
            <a href="#work" class="hover:text-blue-500 transition">Work</a>
            <a href="#services" class="hover:text-blue-500 transition">Services</a>
            <button id="themeToggle" class="w-8 h-8 rounded-full bg-white/10">🌓</button>
        </div>
    </nav>

    <!-- HERO: INTERACTIVE SPACE -->
    <section class="hero-gradient min-h-screen flex flex-col items-center justify-center text-center px-6">
        <motion.div initial={{opacity:0, y:30}} animate={{opacity:1, y:0}} transition={{duration:1}}>
            <h1 class="text-[clamp(3rem,10vw,8rem)] font-black leading-[0.9] mb-8">BUILDING <br/> <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-400">THE IMPOSSIBLE</span></h1>
            <p class="text-gray-400 max-w-lg mb-12 text-lg font-light">Biz kod yozmaymiz, biz raqamli reallikni arxitektura qilamiz. Premium web yechimlar sizning biznesingiz uchun.</p>
        </motion.div>
    </section>

    <!-- GRID STATS & SERVICES -->
    <section class="max-w-7xl mx-auto py-20 px-6 grid grid-cols-1 md:grid-cols-2 gap-10">
        <!-- Stats -->
        <div class="glass p-10 rounded-[3rem] flex flex-col justify-between">
            <h2 class="text-5xl font-black">100+<br/><span class="text-sm font-normal text-gray-500 uppercase">Impactful Projects</span></h2>
            <div class="flex gap-4 mt-10">
                <div class="w-16 h-16 rounded-full bg-blue-600 flex items-center justify-center">01</div>
                <div class="w-16 h-16 rounded-full bg-white/10 flex items-center justify-center">02</div>
            </div>
        </div>
        
        <!-- Services Grid -->
        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-8 rounded-[2rem] hover:bg-blue-600/20 transition cursor-pointer">
                <h3 class="font-bold mb-2">Web Design</h3>
                <p class="text-xs text-gray-500">Premium visual identity</p>
            </div>
            <div class="glass p-8 rounded-[2rem] hover:bg-blue-600/20 transition cursor-pointer">
                <h3 class="font-bold mb-2">Telegram Bots</h3>
                <p class="text-xs text-gray-500">Auto-scaling logic</p>
            </div>
        </div>
    </section>

    <!-- ORDER FORM: MINIMALIST -->
    <section id="order" class="py-20 max-w-xl mx-auto px-6 text-center">
        <h2 class="text-4xl font-black mb-12">Let's talk business.</h2>
        <form id="orderForm" class="space-y-6">
            <div class="grid grid-cols-2 gap-6">
                <input type="text" id="ism" placeholder="Name" class="bg-transparent border-b border-white/20 p-4 outline-none focus:border-blue-500">
                <input type="text" id="raqam" placeholder="Phone" class="bg-transparent border-b border-white/20 p-4 outline-none focus:border-blue-500">
            </div>
            <textarea id="izoh" placeholder="Tell us your vision..." class="w-full bg-transparent border-b border-white/20 p-4 outline-none focus:border-blue-500"></textarea>
            <button type="submit" id="submitBtn" class="w-full py-6 bg-white text-black font-black uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all">Submit Request</button>
        </form>
    </section>

    <script>
        // Framer Motion initial reveal
        const elements = document.querySelectorAll('.glass');
        elements.forEach(el => {
            el.addEventListener('mouseenter', () => el.style.borderColor = '#3b82f6');
            el.addEventListener('mouseleave', () => el.style.borderColor = 'rgba(255,255,255,0.05)');
        });

        // Form handler remains same
        document.getElementById('orderForm').onsubmit = async(e) => {
            e.preventDefault();
            alert("Your vision is being processed...");
        };
    </script>
</body>
</html>
